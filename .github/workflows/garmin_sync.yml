# .github/workflows/garmin_sync.yml
# ─────────────────────────────────────────────────────────────────────────────
# Draait 4x per dag op Amsterdam-tijdzone (CET = UTC+1, CEST = UTC+2)
# Twee sets cron-tijden: zomer (CEST apr-okt) en winter (CET nov-mrt)
# Haalt Garmin-data op en schrijft naar Google Sheets
# ─────────────────────────────────────────────────────────────────────────────

name: Garmin Daily Sync

on:
  schedule:
    # ── Zomer CEST (UTC+2) ── apr t/m okt
    - cron: '30 5 * 4-10 *'   # 07:30 CEST – ochtend
    - cron: '30 10 * 4-10 *'  # 12:30 CEST – middag
    - cron: '30 17 * 4-10 *'  # 19:30 CEST – avond
    - cron: '30 20 * 4-10 *'  # 22:30 CEST – nacht
    # ── Winter CET (UTC+1) ── nov t/m mrt
    - cron: '30 6 * 11-12 *'  # 07:30 CET – ochtend
    - cron: '30 11 * 11-12 *' # 12:30 CET – middag
    - cron: '30 18 * 11-12 *' # 19:30 CET – avond
    - cron: '30 21 * 11-12 *' # 22:30 CET – nacht
    - cron: '30 6 * 1-3 *'    # 07:30 CET – ochtend
    - cron: '30 11 * 1-3 *'   # 12:30 CET – middag
    - cron: '30 18 * 1-3 *'   # 19:30 CET – avond
    - cron: '30 21 * 1-3 *'   # 22:30 CET – nacht
  workflow_dispatch:  # Handmatig triggeren via GitHub UI of API

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Europe/Amsterdam   # Zorgt dat datetime.date.today() Amsterdam-tijd geeft

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r backend/requirements.txt

      - name: Garmin tokens herstellen (cache)
        uses: actions/cache@v4
        with:
          path: backend/.garmin_tokens
          key: garmin-tokens-${{ github.run_id }}
          restore-keys: |
            garmin-tokens-

      - name: Garmin tokens herstellen vanuit Secret
        run: |
          if [ -n "$GARMIN_TOKENS" ]; then
            echo "$GARMIN_TOKENS" | base64 -d | tar -xz -C .
            echo "  ✓ Tokens hersteld vanuit Secret"
            ls backend/.garmin_tokens/ || echo "  ⚠ Token dir leeg"
          fi
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}

      - name: Garmin sync uitvoeren
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SHEET_TAB_NAME: coach_data
          GOOGLE_SERVICE_ACCOUNT_JSON: ./service_account.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}' > backend/service_account.json
          cd backend
          python garmin_sync.py

      - name: Tokens opslaan voor morgen
        if: always()
        uses: actions/cache/save@v4
        with:
          path: backend/.garmin_tokens
          key: garmin-tokens-${{ github.run_id }}
