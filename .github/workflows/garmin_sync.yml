# .github/workflows/garmin_sync.yml
# ─────────────────────────────────────────────────────────────────────────────
# Draait elke ochtend om 06:30 Nederlandse tijd (05:30 UTC)
# Haalt Garmin-data op en schrijft naar Google Sheets
# Geen server nodig — volledig gratis via GitHub Actions
# ─────────────────────────────────────────────────────────────────────────────

name: Garmin Daily Sync

on:
  schedule:
    - cron: '30 5 * * *'   # 07:30 CEST – ochtend (HRV, slaap, battery na opstaan)
    - cron: '30 10 * * *'  # 12:30 CEST – middag  (stappen, activiteiten, stress update)
    - cron: '30 17 * * *'  # 19:30 CEST – avond   (eindstand stappen, activiteiten)
    - cron: '30 20 * * *'  # 22:30 CEST – nacht   (battery voor bed, geplande workouts)
  workflow_dispatch:  # Handmatig triggeren via GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r backend/requirements.txt

      - name: Garmin tokens herstellen (cache)
        uses: actions/cache@v4
        with:
          path: backend/.garmin_tokens
          key: garmin-tokens-${{ github.run_id }}
          restore-keys: |
            garmin-tokens-

      - name: Garmin tokens herstellen vanuit Secret
        run: |
          if [ -n "$GARMIN_TOKENS" ]; then
            echo "$GARMIN_TOKENS" | base64 -d | tar -xz -C .
            echo "  ✓ Tokens hersteld vanuit Secret"
            ls backend/.garmin_tokens/ || echo "  ⚠ Token dir leeg"
          fi
        env:
          GARMIN_TOKENS: ${{ secrets.GARMIN_TOKENS }}

      - name: Garmin sync uitvoeren
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SHEET_TAB_NAME: coach_data
          GOOGLE_SERVICE_ACCOUNT_JSON: ./service_account.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT }}' > backend/service_account.json
          cd backend
          python garmin_sync.py

      - name: Tokens opslaan voor morgen
        if: always()
        uses: actions/cache/save@v4
        with:
          path: backend/.garmin_tokens
          key: garmin-tokens-${{ github.run_id }}
